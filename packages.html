<!DOCTYPE html>
<html>
<head>
<title>packages page</title>
<link rel="stylesheet" href="styles.css">
<style>
body{
  background-color: #e4d6d6;
  margin: 0;
  padding-top: 120px;
  font-family: Arial, Helvetica, sans-serif;
  color: #111;
}
.real-cash{
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px;
  display: flex;
  gap: 20px; /* small space between cards */
  align-items: stretch; /* make grid items stretch to same height */
  justify-content: center; /* ensure equal-height rows */
}
.honey{
  background-color: #e2dddd;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100%; /* fill the grid cell */
}
.honey img{
  width: 100%;
  height: 220px; /* fixed visual height so all images match */
  object-fit: cover; /* crop consistently without distortion */
  display: block;
}
.trainer, .personal{
  font-size: 22px;
  color: #111;
  margin: 12px 16px 6px;
  font-weight: 700;
}
.money, .credit{
  font-size: 16px;
  margin: 0 16px 16px;
  color: #222;
}

/* Larger screens: two columns */
@media (min-width: 700px){
  .real-cash{grid-template-columns: repeat(2, 1fr); padding: 24px; gap: 24px}
  .honey img{height:240px}
  .trainer, .personal{font-size:24px}
  .money, .credit{font-size:18px}
}

/* Desktop: three columns */
@media (min-width: 1000px){
  .real-cash{grid-template-columns: repeat(3, 1fr); padding: 32px}
  .honey img{height:280px}
  .trainer, .personal{font-size:26px}
}
</style>
</head>
<body>


<div class="header">
<div class="left-section"><img loading="lazy" class="buisness" src="buisness_logo.png">
</div>
<div class="middle-section">
<a href="website.html"  class="home">Home</a>
<a href="about.html" class="about">About</a>
<a href="packages.html" class="packages">Packages</a>
<a href="contact.html" class="contact">Contact</a>


</div>
<div class="right-section"><img loading="lazy" class="bag"  src="bag.png">  <p class="shopping-bag">Shopping bag</p></div>



</div>


<div class="real-cash">
<div class="honey">
  <img class="trademill" src="trademill.jpg">
    <p class="trainer">Personal Training</p>
    <p class="money">$120.00</p>
</div>







<div class="honey">
  <img class="biceps" src="biceps.avif">
    <p class="personal">Personal Training</p>
    <p class="credit">$200.00</p>
</div>


</div>




</body>


</html>
